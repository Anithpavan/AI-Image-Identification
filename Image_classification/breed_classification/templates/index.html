<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Breed Classification</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
            max-width: 600px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
            animation: slideIn 0.8s ease-out;
            position: relative;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.05) 100%);
            border-radius: 24px;
            z-index: -1;
        }

        h1 {
            color: #fff;
            margin-bottom: 8px;
            font-size: 2.5rem;
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: rgba(255,255,255,0.9);
            font-size: 1.1rem;
            margin-bottom: 30px;
            font-weight: 400;
        }

        .user-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.1);
            padding: 12px 20px;
            border-radius: 50px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .welcome {
            color: #fff;
            font-weight: 600;
        }

        .logout-link {
            color: #fff;
            text-decoration: none;
            padding: 8px 16px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .logout-link:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-1px);
        }

        .upload-area {
            border: 3px dashed rgba(255,255,255,0.4);
            border-radius: 20px;
            padding: 50px 30px;
            margin: 30px 0;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            background: rgba(255,255,255,0.05);
            position: relative;
            overflow: hidden;
        }

        .upload-area::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent);
            border-radius: 20px;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: -1;
        }

        .upload-area:hover {
            border-color: rgba(255,255,255,0.8);
            background: rgba(255,255,255,0.1);
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        .upload-area:hover::before {
            opacity: 1;
        }

        .upload-area.dragover {
            border-color: #fff;
            background: rgba(255,255,255,0.15);
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .upload-text {
            color: #fff;
            font-size: 1.3rem;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .upload-subtext {
            color: rgba(255,255,255,0.8);
            font-size: 1rem;
            margin-bottom: 15px;
        }

        .upload-hint {
            color: rgba(255,255,255,0.6);
            font-size: 0.85rem;
            font-style: italic;
        }

        #file-input { display: none; }

        .preview-container {
            margin: 30px 0;
            display: none;
            animation: fadeInUp 0.5s ease-out;
        }

        .preview-image {
            max-width: 100%;
            max-height: 350px;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            margin-bottom: 20px;
            border: 3px solid rgba(255,255,255,0.3);
        }

        .file-info {
            background: rgba(255,255,255,0.15);
            padding: 15px 20px;
            border-radius: 12px;
            color: #fff;
            font-size: 0.95rem;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
        }

        .predict-btn {
            background: linear-gradient(135deg, #ff6b6b, #ee5a24, #ff9ff3);
            color: white;
            border: none;
            padding: 18px 50px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 25px rgba(255, 107, 107, 0.4);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            position: relative;
            overflow: hidden;
        }

        .predict-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.6s;
        }

        .predict-btn:hover::before {
            left: 100%;
        }

        .predict-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 15px 40px rgba(255,107,107,0.6);
        }

        .predict-btn:active {
            transform: translateY(-1px) scale(1.02);
        }

        .predict-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .predict-btn:disabled:hover {
            transform: none;
            box-shadow: 0 8px 25px rgba(255, 107, 107, 0.4);
        }

        .loading {
            display: none;
            color: #fff;
            font-style: italic;
            margin-top: 20px;
            font-size: 1.1rem;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            overflow: hidden;
            margin-top: 15px;
            display: none;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff6b6b, #ee5a24);
            border-radius: 2px;
            width: 0%;
            transition: width 0.3s ease;
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .supported-formats {
            margin-top: 30px;
            padding: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .formats-title {
            color: #fff;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .format-tag {
            display: inline-block;
            background: rgba(255,255,255,0.15);
            color: #fff;
            padding: 6px 12px;
            border-radius: 20px;
            margin: 4px;
            font-size: 0.8rem;
            font-weight: 600;
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.3s ease;
        }

        .format-tag:hover {
            background: rgba(255,255,255,0.25);
            transform: translateY(-2px);
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            padding: 15px;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .stat-item {
            text-align: center;
            color: #fff;
        }

        .stat-number {
            font-size: 1.5rem;
            font-weight: 700;
            display: block;
        }

        .stat-label {
            font-size: 0.8rem;
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Mobile optimizations */
        @media (max-width: 768px) {
            .container { padding: 30px 20px; margin: 10px; }
            h1 { font-size: 2rem; }
            .upload-area { padding: 40px 20px; }
            .predict-btn { padding: 15px 35px; font-size: 1rem; }
            .user-info { flex-direction: column; gap: 10px; text-align: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1> AI Breed Classifier</h1>
        <p class="subtitle">Powered by advanced machine learning</p>
        
        <div class="user-info">
            <div class="welcome">Welcome back, <strong>{{ user }}</strong>!</div>
            <a href="/logout" class="logout-link">Sign Out</a>
        </div>

        <div class="stats">
            <div class="stat-item">
                <span class="stat-number">250+</span>
                <span class="stat-label">Species</span>
            </div>
            <div class="stat-item">
                <span class="stat-number">98.5%</span>
                <span class="stat-label">Accuracy</span>
            </div>
            <div class="stat-item">
                <span class="stat-number"> 3s</span>
                <span class="stat-label">Analysis</span>
            </div>
        </div>

        <form id="upload-form" action="/predict" method="post" enctype="multipart/form-data">
            <div class="upload-area" id="upload-area">
                <div class="upload-icon">🖼️</div>
                <div class="upload-text">Drop your image here</div>
                <div class="upload-subtext">or click to browse files</div>
                <div class="upload-hint">Drag & drop supported • Max 10MB</div>
                <input type="file" id="file-input" name="file" accept="image/*" required>
            </div>

            <div class="preview-container" id="preview-container">
                <img id="preview-image" class="preview-image" alt="Preview">
                <div class="file-info" id="file-info"></div>
            </div>

            <button type="submit" class="predict-btn" id="predict-btn" disabled>
                🔬 Analyze Breed
            </button>

            <div class="loading" id="loading">
                🧠 AI is analyzing your image...
                <div class="progress-bar" id="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
            </div>
        </form>

        <div class="supported-formats">
            <div class="formats-title">Supported Formats</div>
            <span class="format-tag">JPEG</span>
            <span class="format-tag">PNG</span>
            <span class="format-tag">WEBP</span>
            <span class="format-tag">BMP</span>
            <span class="format-tag">TIFF</span>
            <span class="format-tag">SVG</span>
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById('upload-area');
        const fileInput = document.getElementById('file-input');
        const previewContainer = document.getElementById('preview-container');
        const previewImage = document.getElementById('preview-image');
        const fileInfo = document.getElementById('file-info');
        const predictBtn = document.getElementById('predict-btn');
        const uploadForm = document.getElementById('upload-form');
        const loading = document.getElementById('loading');
        const progressBar = document.getElementById('progress-bar');
        const progressFill = document.getElementById('progress-fill');

        // Enhanced drag and drop
        uploadArea.addEventListener('click', () => fileInput.click());
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        
        uploadArea.addEventListener('dragleave', (e) => {
            if (!uploadArea.contains(e.relatedTarget)) {
                uploadArea.classList.remove('dragover');
            }
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) {
                handleFile(e.dataTransfer.files[0]);
            }
        });
        
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        // Enhanced file handling with validation
        function handleFile(file) {
            // File type validation
            const allowedTypes = ['image/jpeg', 'image/jpg', 'image/png', 'image/webp', 'image/bmp', 'image/tiff', 'image/svg+xml'];
            if (!allowedTypes.includes(file.type)) {
                showAlert('Please select a valid image file (JPEG, PNG, WEBP, BMP, TIFF, or SVG)', 'error');
                return;
            }

            // File size validation
            const maxSize = 10 * 1024 * 1024; // 10MB
            if (file.size > maxSize) {
                showAlert('File size must be less than 10MB', 'error');
                return;
            }

            // File name validation
            if (file.name.length > 100) {
                showAlert('Filename is too long', 'error');
                return;
            }

            const reader = new FileReader();
            reader.onload = (e) => {
                previewImage.src = e.target.result;
                previewContainer.style.display = 'block';
                
                const sizeInMB = (file.size / 1024 / 1024).toFixed(2);
                const dimensions = file.type.startsWith('image/') ? ' • Analyzing dimensions...' : '';
                fileInfo.innerHTML = `
                    <strong>${file.name}</strong><br>
                    Size: ${sizeInMB} MB • Type: ${file.type.split('/')[1].toUpperCase()}${dimensions}
                `;
                
                predictBtn.disabled = false;
                predictBtn.style.animation = 'pulse 2s infinite';
                
                // Get image dimensions
                previewImage.onload = () => {
                    const width = previewImage.naturalWidth;
                    const height = previewImage.naturalHeight;
                    fileInfo.innerHTML = `
                        <strong>${file.name}</strong><br>
                        Size: ${sizeInMB} MB • ${width}×${height}px • ${file.type.split('/')[1].toUpperCase()}
                    `;
                };
            };
            
            reader.onerror = () => {
                showAlert('Error reading file. Please try again.', 'error');
            };
            
            reader.readAsDataURL(file);
        }

        // Enhanced form submission with progress simulation
        uploadForm.addEventListener('submit', (e) => {
            if (predictBtn.disabled) return;
            
            predictBtn.disabled = true;
            predictBtn.textContent = '🔄 Processing...';
            predictBtn.style.animation = '';
            loading.style.display = 'block';
            progressBar.style.display = 'block';
            
            // Simulate progress
            let progress = 0;
            const interval = setInterval(() => {
                progress += Math.random() * 15;
                if (progress > 90) {
                    progress = 90;
                    clearInterval(interval);
                }
                progressFill.style.width = progress + '%';
            }, 200);
            
            // Clean up on actual form submission
            setTimeout(() => {
                clearInterval(interval);
                progressFill.style.width = '100%';
            }, 2000);
        });

        // Alert system
        function showAlert(message, type = 'info') {
            const alertDiv = document.createElement('div');
            alertDiv.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                padding: 15px 20px;
                border-radius: 12px;
                color: white;
                font-weight: 600;
                z-index: 1000;
                animation: slideInRight 0.3s ease-out;
                max-width: 300px;
                box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            `;
            
            const colors = {
                error: 'linear-gradient(135deg, #ff6b6b, #ee5a24)',
                success: 'linear-gradient(135deg, #55a3ff, #003d82)',
                info: 'linear-gradient(135deg, #667eea, #764ba2)'
            };
            
            alertDiv.style.background = colors[type] || colors.info;
            alertDiv.textContent = message;
            
            document.body.appendChild(alertDiv);
            
            setTimeout(() => {
                alertDiv.style.animation = 'slideOutRight 0.3s ease-in forwards';
                setTimeout(() => document.body.removeChild(alertDiv), 300);
            }, 3000);
        }

        // Add CSS for alert animations
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideInRight {
                from { transform: translateX(100%); opacity: 0; }
                to { transform: translateX(0); opacity: 1; }
            }
            @keyframes slideOutRight {
                from { transform: translateX(0); opacity: 1; }
                to { transform: translateX(100%); opacity: 0; }
            }
        `;
        document.head.appendChild(style);

        // Keyboard accessibility
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
                if (e.target === uploadArea) {
                    e.preventDefault();
                    fileInput.click();
                }
            }
        });

        // Add focus styles for accessibility
        uploadArea.setAttribute('tabindex', '0');
        uploadArea.setAttribute('role', 'button');
        uploadArea.setAttribute('aria-label', 'Upload animal image for classification');
    </script>
</body>
</html>
